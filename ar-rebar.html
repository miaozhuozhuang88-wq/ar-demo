<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR钢筋机械连接演示</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: #0a0a0f;
    color: #fff;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    touch-action: none;
  }

  #camera-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  #three-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* Fallback background when no camera */
  .no-camera-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  }

  /* Top HUD */
  .hud-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 12px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .hud-title {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.9);
  }

  .hud-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #00e5ff;
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 20px;
    padding: 4px 10px;
  }

  .hud-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: #00e5ff;
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Bottom Panel */
  .bottom-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.6) 70%, transparent 100%);
    padding: 20px 16px 30px;
  }

  /* Narration text */
  .narration-box {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
    min-height: 60px;
    display: flex;
    align-items: center;
  }

  .narration-text {
    font-size: 14px;
    line-height: 1.6;
    color: rgba(255,255,255,0.92);
    font-weight: 300;
  }

  .narration-text .highlight {
    color: #ffab40;
    font-weight: 500;
  }

  /* Step indicators */
  .step-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .step-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.4s ease;
  }

  .step-dot.active {
    background: #00e5ff;
    box-shadow: 0 0 8px rgba(0,229,255,0.5);
    width: 24px;
    border-radius: 4px;
  }

  .step-dot.done {
    background: rgba(0,229,255,0.5);
  }

  /* Controls */
  .controls-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .ctrl-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn:active {
    transform: scale(0.92);
  }

  .btn-secondary {
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 18px;
  }

  .btn-primary {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, #00e5ff, #00b0ff);
    color: #0a0a0f;
    font-size: 22px;
    box-shadow: 0 4px 20px rgba(0,229,255,0.3);
  }

  .btn-primary.paused {
    background: linear-gradient(135deg, #ffab40, #ff6d00);
    box-shadow: 0 4px 20px rgba(255,171,64,0.3);
  }

  /* Dimension label overlay */
  .dim-label {
    position: fixed;
    z-index: 5;
    font-size: 11px;
    color: #ffab40;
    background: rgba(0,0,0,0.6);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid rgba(255,171,64,0.3);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }

  .dim-label.visible {
    opacity: 1;
  }

  /* Start overlay */
  .start-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 100;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    transition: opacity 0.5s ease;
  }

  .start-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .start-icon {
    width: 80px; height: 80px;
    border: 2px solid rgba(0,229,255,0.4);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    background: rgba(0,229,255,0.05);
  }

  .start-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .start-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    line-height: 1.6;
    max-width: 280px;
  }

  .start-btn {
    margin-top: 8px;
    padding: 14px 48px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #00e5ff, #00b0ff);
    color: #0a0a0f;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    letter-spacing: 2px;
    transition: transform 0.2s;
  }

  .start-btn:active {
    transform: scale(0.95);
  }

  .mode-toggle {
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }

  .mode-btn {
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn.selected {
    border-color: #00e5ff;
    color: #00e5ff;
    background: rgba(0,229,255,0.1);
  }

  /* Gyro permission hint */
  .gyro-hint {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 50;
    background: rgba(0,0,0,0.9);
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    max-width: 300px;
    display: none;
  }

  .gyro-hint p {
    font-size: 14px;
    margin-bottom: 16px;
    color: rgba(255,255,255,0.8);
  }

  /* Speed indicator */
  .speed-badge {
    position: fixed;
    top: 60px;
    right: 16px;
    z-index: 10;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.4);
    padding: 4px 8px;
    border-radius: 4px;
  }
</style>
</head>
<body>

<div class="no-camera-bg" id="fallbackBg"></div>
<video id="camera-bg" autoplay playsinline muted></video>
<canvas id="three-canvas"></canvas>

<!-- Dimension labels -->
<div class="dim-label" id="dimSleeve">套筒长度: 标准型</div>
<div class="dim-label" id="dimRebar">钢筋直径: Φ25</div>

<!-- Top HUD -->
<div class="hud-top">
  <div class="hud-title">钢筋机械连接 · AR演示</div>
  <div class="hud-badge" id="arBadge">AR模式</div>
</div>

<div class="speed-badge" id="speedBadge">1x 速度</div>

<!-- Bottom panel -->
<div class="bottom-panel">
  <div class="narration-box">
    <div class="narration-text" id="narrationText">点击播放开始演示</div>
  </div>
  <div class="step-row" id="stepRow"></div>
  <div class="controls-row">
    <button class="ctrl-btn btn-secondary" id="btnPrev" title="上一步">⟨</button>
    <button class="ctrl-btn btn-secondary" id="btnReset" title="重置">↺</button>
    <button class="ctrl-btn btn-primary" id="btnPlay" title="播放/暂停">▶</button>
    <button class="ctrl-btn btn-secondary" id="btnSpeed" title="速度">1x</button>
    <button class="ctrl-btn btn-secondary" id="btnNext" title="下一步">⟩</button>
  </div>
</div>

<!-- Start overlay -->
<div class="start-overlay" id="startOverlay">
  <div class="start-icon">🔩</div>
  <div class="start-title">钢筋机械连接</div>
  <div class="start-sub">
    第五章第二节 · 钢筋工程<br>
    直螺纹套筒连接施工工艺AR演示
  </div>
  <div class="mode-toggle">
    <button class="mode-btn selected" id="modeAR" onclick="selectMode('ar')">📷 AR模式</button>
    <button class="mode-btn" id="mode3D" onclick="selectMode('3d')">🧊 3D模式</button>
  </div>
  <button class="start-btn" id="startBtn">开始演示</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// CONFIG & STATE
// ============================================================
let useAR = true;
let scene, camera, renderer, clock;
let rebarLeft, rebarRight, sleeve, threads;
let isPlaying = false;
let currentStep = 0;
let animProgress = 0;
let speedMultiplier = 1;
let gyroEnabled = false;
let touchStartX = 0, touchStartY = 0;
let rotX = 0, rotY = 0;
let targetRotX = 0, targetRotY = 0;
let autoRotate = true;

// Steps definition
const steps = [
  {
    title: '钢筋端部加工',
    narration: '首先对钢筋端部进行<span class="highlight">滚轧螺纹加工</span>。使用专用滚丝机，将钢筋端头加工出标准螺纹，螺纹长度应满足连接套筒的要求。',
    duration: 4
  },
  {
    title: '检验螺纹质量',
    narration: '加工完成后，用<span class="highlight">专用螺纹量规</span>检验螺纹精度。通规能顺利旋入、止规旋入不超过3扣为合格。螺纹表面不得有裂纹、断牙等缺陷。',
    duration: 3.5
  },
  {
    title: '安装连接套筒',
    narration: '将<span class="highlight">直螺纹连接套筒</span>旋入左侧钢筋端头。套筒材料为优质碳素结构钢，强度不低于钢筋母材。旋入时应确保丝扣完全啮合。',
    duration: 4.5
  },
  {
    title: '对接右侧钢筋',
    narration: '将右侧钢筋对准套筒另一端，<span class="highlight">旋转拧入</span>至钢筋端头在套筒中央对顶。两侧钢筋外露丝扣各不超过<span class="highlight">2个完整丝扣</span>。',
    duration: 5
  },
  {
    title: '力矩扳手紧固',
    narration: '使用<span class="highlight">力矩扳手</span>按规定扭矩值拧紧。Φ25钢筋的拧紧力矩不小于<span class="highlight">290N·m</span>。紧固后用油漆标记，表示已完成质量检验。',
    duration: 4
  },
  {
    title: '连接完成',
    narration: '机械连接完成。接头强度达到钢筋母材<span class="highlight">抗拉强度标准值的110%</span>以上，属于<span class="highlight">Ⅰ级接头</span>，可用于任何受力构件。',
    duration: 3.5
  }
];

// ============================================================
// MODE SELECTION
// ============================================================
function selectMode(mode) {
  useAR = mode === 'ar';
  document.getElementById('modeAR').classList.toggle('selected', useAR);
  document.getElementById('mode3D').classList.toggle('selected', !useAR);
}

// ============================================================
// INIT
// ============================================================
document.getElementById('startBtn').addEventListener('click', async () => {
  if (useAR) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      const video = document.getElementById('camera-bg');
      video.srcObject = stream;
      video.style.display = 'block';
      document.getElementById('fallbackBg').style.display = 'none';
      document.getElementById('arBadge').textContent = 'AR 实时';
    } catch (e) {
      console.log('Camera not available, falling back to 3D mode');
      document.getElementById('arBadge').textContent = '3D模式';
      document.getElementById('camera-bg').style.display = 'none';
    }
  } else {
    document.getElementById('arBadge').textContent = '3D模式';
    document.getElementById('camera-bg').style.display = 'none';
  }

  document.getElementById('startOverlay').classList.add('hidden');
  initThree();
  initGyro();
  initTouch();
  buildStepDots();
  updateNarration();
  animate();
});

// ============================================================
// THREE.JS SCENE
// ============================================================
function initThree() {
  clock = new THREE.Clock();
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0.8, 4);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById('three-canvas'),
    alpha: true,
    antialias: true
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  // Lights
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(3, 5, 4);
  dirLight.castShadow = true;
  scene.add(dirLight);

  const rimLight = new THREE.DirectionalLight(0x00e5ff, 0.3);
  rimLight.position.set(-3, 2, -2);
  scene.add(rimLight);

  const warmLight = new THREE.PointLight(0xffab40, 0.4, 10);
  warmLight.position.set(0, 3, 0);
  scene.add(warmLight);

  // Build rebar models
  buildModels();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

function createRebarMaterial() {
  return new THREE.MeshStandardMaterial({
    color: 0x6a6a6a,
    metalness: 0.85,
    roughness: 0.35
  });
}

function createSleeveMaterial() {
  return new THREE.MeshStandardMaterial({
    color: 0x8a8a8a,
    metalness: 0.9,
    roughness: 0.2
  });
}

function createThreadMaterial() {
  return new THREE.MeshStandardMaterial({
    color: 0x9a9a9a,
    metalness: 0.8,
    roughness: 0.3
  });
}

function createHighlightMaterial() {
  return new THREE.MeshStandardMaterial({
    color: 0xffab40,
    metalness: 0.7,
    roughness: 0.3,
    emissive: 0xffab40,
    emissiveIntensity: 0.2
  });
}

function buildModels() {
  const rebarMat = createRebarMaterial();
  const sleeveMat = createSleeveMaterial();
  const threadMat = createThreadMaterial();

  // Main group
  const mainGroup = new THREE.Group();
  scene.add(mainGroup);

  // Left rebar - long cylinder
  const rebarGeo = new THREE.CylinderGeometry(0.12, 0.12, 3, 32);
  rebarLeft = new THREE.Group();
  const leftBar = new THREE.Mesh(rebarGeo, rebarMat);
  leftBar.rotation.z = Math.PI / 2;
  leftBar.position.x = -1.5;
  rebarLeft.add(leftBar);

  // Left rebar ribs (deformation pattern)
  for (let i = 0; i < 12; i++) {
    const ribGeo = new THREE.TorusGeometry(0.13, 0.015, 8, 32);
    const rib = new THREE.Mesh(ribGeo, rebarMat);
    rib.position.x = -2.8 + i * 0.2;
    rib.rotation.y = Math.PI / 2;
    rebarLeft.add(rib);
  }

  // Left thread section
  const leftThread = new THREE.Group();
  for (let i = 0; i < 8; i++) {
    const tGeo = new THREE.TorusGeometry(0.125, 0.012, 8, 32);
    const t = new THREE.Mesh(tGeo, threadMat);
    t.position.x = -0.05 + i * 0.045;
    t.rotation.y = Math.PI / 2;
    leftThread.add(t);
  }
  // Thread base cylinder
  const threadBase = new THREE.CylinderGeometry(0.11, 0.11, 0.4, 32);
  const leftThreadBase = new THREE.Mesh(threadBase, threadMat);
  leftThreadBase.rotation.z = Math.PI / 2;
  leftThreadBase.position.x = 0.12;
  leftThread.add(leftThreadBase);
  rebarLeft.add(leftThread);

  mainGroup.add(rebarLeft);

  // Right rebar
  rebarRight = new THREE.Group();
  const rightBar = new THREE.Mesh(rebarGeo.clone(), rebarMat);
  rightBar.rotation.z = Math.PI / 2;
  rightBar.position.x = 1.5;
  rebarRight.add(rightBar);

  // Right rebar ribs
  for (let i = 0; i < 12; i++) {
    const ribGeo = new THREE.TorusGeometry(0.13, 0.015, 8, 32);
    const rib = new THREE.Mesh(ribGeo, rebarMat);
    rib.position.x = 0.6 + i * 0.2;
    rib.rotation.y = Math.PI / 2;
    rebarRight.add(rib);
  }

  // Right thread section
  const rightThread = new THREE.Group();
  for (let i = 0; i < 8; i++) {
    const tGeo = new THREE.TorusGeometry(0.125, 0.012, 8, 32);
    const t = new THREE.Mesh(tGeo, threadMat);
    t.position.x = 0.05 - i * 0.045;
    t.rotation.y = Math.PI / 2;
    rightThread.add(t);
  }
  const rightThreadBase = new THREE.Mesh(threadBase.clone(), threadMat);
  rightThreadBase.rotation.z = Math.PI / 2;
  rightThreadBase.position.x = -0.12;
  rightThread.add(rightThreadBase);
  rebarRight.add(rightThread);

  // Initial position: right rebar far away
  rebarRight.position.x = 3;
  mainGroup.add(rebarRight);

  // Sleeve (connection coupler)
  sleeve = new THREE.Group();
  const sleeveOuter = new THREE.CylinderGeometry(0.2, 0.2, 0.7, 6); // hexagonal
  const sleeveBody = new THREE.Mesh(sleeveOuter, sleeveMat);
  sleeveBody.rotation.z = Math.PI / 2;
  sleeve.add(sleeveBody);

  // Sleeve inner threads visual
  const innerGeo = new THREE.CylinderGeometry(0.13, 0.13, 0.68, 32);
  const innerMat = new THREE.MeshStandardMaterial({
    color: 0x555555, metalness: 0.9, roughness: 0.4, side: THREE.BackSide
  });
  const inner = new THREE.Mesh(innerGeo, innerMat);
  inner.rotation.z = Math.PI / 2;
  sleeve.add(inner);

  // Hex markings on sleeve
  for (let i = 0; i < 2; i++) {
    const ringGeo = new THREE.TorusGeometry(0.21, 0.01, 8, 6);
    const ring = new THREE.Mesh(ringGeo, sleeveMat);
    ring.position.x = -0.2 + i * 0.4;
    ring.rotation.y = Math.PI / 2;
    sleeve.add(ring);
  }

  // Initially hide sleeve far away
  sleeve.position.x = -5;
  sleeve.visible = false;
  mainGroup.add(sleeve);

  // Store reference
  scene.userData.mainGroup = mainGroup;
}

// ============================================================
// ANIMATION LOGIC PER STEP
// ============================================================
function getStepAnimation(step, progress) {
  const mainGroup = scene.userData.mainGroup;
  const p = Math.min(1, Math.max(0, progress));
  const ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2; // easeInOutQuad

  switch (step) {
    case 0: // Thread processing - show threads appearing on left rebar
      rebarLeft.position.x = 0;
      rebarRight.position.x = 3;
      sleeve.visible = false;

      // Pulse the thread section to highlight
      rebarLeft.children.forEach((child, i) => {
        if (i > 12) { // thread parts
          child.scale.setScalar(0.5 + ease * 0.5);
          if (child.material && child.material.emissive) {
            child.material.emissiveIntensity = 0.3 * Math.sin(p * Math.PI);
          }
        }
      });

      // Highlight glow effect
      const glowIntensity = Math.sin(p * Math.PI * 2) * 0.3 + 0.3;
      rebarLeft.children.forEach(child => {
        if (child.material === undefined) return;
      });
      break;

    case 1: // Inspect threads - rotate rebar slowly
      rebarLeft.rotation.x = ease * Math.PI * 2;
      rebarRight.position.x = 3;
      sleeve.visible = false;
      break;

    case 2: // Install sleeve on left rebar
      rebarLeft.rotation.x = 0;
      sleeve.visible = true;
      // Sleeve slides in from left
      sleeve.position.x = -2 + ease * 2;
      sleeve.rotation.x = ease * Math.PI * 4; // spinning as it screws on
      // Final position at x=0 (on the left rebar end)
      break;

    case 3: // Right rebar approaches and screws into sleeve
      sleeve.position.x = 0;
      sleeve.rotation.x = 0;
      // Right rebar approaches
      rebarRight.position.x = 3 - ease * 2.65;
      rebarRight.rotation.x = ease * Math.PI * 3; // spinning
      break;

    case 4: // Torque wrench tightening - sleeve rotates with vibration
      rebarRight.position.x = 0.35;
      rebarRight.rotation.x = 0;
      // Vibration effect
      const vibration = Math.sin(p * Math.PI * 20) * 0.005 * (1 - ease);
      sleeve.position.y = vibration;
      sleeve.rotation.x = ease * Math.PI * 0.5;
      // Highlight sleeve
      break;

    case 5: // Complete - show final assembly, gentle rotation
      sleeve.position.y = 0;
      rebarRight.position.x = 0.35;
      // Slow celebratory rotation
      mainGroup.rotation.y = ease * Math.PI * 0.3;
      break;
  }
}

// Reset all transforms
function resetModels() {
  const mainGroup = scene.userData.mainGroup;
  if (!mainGroup) return;

  rebarLeft.position.set(0, 0, 0);
  rebarLeft.rotation.set(0, 0, 0);
  rebarRight.position.set(3, 0, 0);
  rebarRight.rotation.set(0, 0, 0);
  sleeve.position.set(-5, 0, 0);
  sleeve.rotation.set(0, 0, 0);
  sleeve.visible = false;
  mainGroup.rotation.set(0, 0, 0);
}

// ============================================================
// GYROSCOPE
// ============================================================
function initGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+ requires permission
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') {
          window.addEventListener('deviceorientation', handleGyro);
          gyroEnabled = true;
        }
      })
      .catch(console.error);
  } else if ('DeviceOrientationEvent' in window) {
    window.addEventListener('deviceorientation', handleGyro);
    gyroEnabled = true;
  }
}

function handleGyro(event) {
  if (!gyroEnabled) return;
  const beta = event.beta || 0;  // -180 to 180 (front/back tilt)
  const gamma = event.gamma || 0; // -90 to 90 (left/right tilt)

  targetRotX = THREE.MathUtils.degToRad(beta - 45) * 0.3;
  targetRotY = THREE.MathUtils.degToRad(gamma) * 0.3;
  autoRotate = false;
}

// ============================================================
// TOUCH CONTROLS (fallback for desktop)
// ============================================================
function initTouch() {
  const canvas = document.getElementById('three-canvas');

  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      autoRotate = false;
    }
  }, { passive: true });

  canvas.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1) {
      const dx = e.touches[0].clientX - touchStartX;
      const dy = e.touches[0].clientY - touchStartY;
      targetRotY += dx * 0.005;
      targetRotX += dy * 0.005;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }
  }, { passive: true });

  // Mouse controls for desktop
  let mouseDown = false;
  canvas.addEventListener('mousedown', (e) => {
    mouseDown = true;
    touchStartX = e.clientX;
    touchStartY = e.clientY;
    autoRotate = false;
  });

  canvas.addEventListener('mousemove', (e) => {
    if (!mouseDown) return;
    const dx = e.clientX - touchStartX;
    const dy = e.clientY - touchStartY;
    targetRotY += dx * 0.005;
    targetRotX += dy * 0.005;
    touchStartX = e.clientX;
    touchStartY = e.clientY;
  });

  canvas.addEventListener('mouseup', () => mouseDown = false);
  canvas.addEventListener('mouseleave', () => mouseDown = false);
}

// ============================================================
// NARRATION (Web Speech API)
// ============================================================
let currentUtterance = null;
let speechSynth = window.speechSynthesis;

function speakNarration(text) {
  // Strip HTML tags for speech
  const plain = text.replace(/<[^>]*>/g, '');
  speechSynth.cancel();

  const utter = new SpeechSynthesisUtterance(plain);
  utter.lang = 'zh-CN';
  utter.rate = 0.9;
  utter.pitch = 1.0;

  // Try to find a Chinese voice
  const voices = speechSynth.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) utter.voice = zhVoice;

  currentUtterance = utter;
  speechSynth.speak(utter);
}

function stopNarration() {
  speechSynth.cancel();
}

// ============================================================
// UI CONTROLS
// ============================================================
function buildStepDots() {
  const row = document.getElementById('stepRow');
  row.innerHTML = '';
  steps.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'step-dot' + (i === 0 ? ' active' : '');
    dot.dataset.index = i;
    row.appendChild(dot);
  });
}

function updateStepDots() {
  document.querySelectorAll('.step-dot').forEach((dot, i) => {
    dot.className = 'step-dot';
    if (i < currentStep) dot.classList.add('done');
    if (i === currentStep) dot.classList.add('active');
  });
}

function updateNarration() {
  const el = document.getElementById('narrationText');
  el.innerHTML = steps[currentStep].narration;
}

function goToStep(step) {
  if (step < 0 || step >= steps.length) return;
  currentStep = step;
  animProgress = 0;
  resetModels();
  // Replay previous steps instantly
  for (let i = 0; i < currentStep; i++) {
    getStepAnimation(i, 1);
  }
  updateStepDots();
  updateNarration();
  if (isPlaying) {
    speakNarration(steps[currentStep].narration);
  }
}

// Play/Pause
document.getElementById('btnPlay').addEventListener('click', () => {
  isPlaying = !isPlaying;
  const btn = document.getElementById('btnPlay');
  if (isPlaying) {
    btn.textContent = '⏸';
    btn.classList.remove('paused');
    speakNarration(steps[currentStep].narration);
  } else {
    btn.textContent = '▶';
    btn.classList.add('paused');
    stopNarration();
  }
});

// Next/Prev
document.getElementById('btnNext').addEventListener('click', () => {
  if (currentStep < steps.length - 1) goToStep(currentStep + 1);
});

document.getElementById('btnPrev').addEventListener('click', () => {
  if (currentStep > 0) goToStep(currentStep - 1);
});

// Reset
document.getElementById('btnReset').addEventListener('click', () => {
  isPlaying = false;
  document.getElementById('btnPlay').textContent = '▶';
  stopNarration();
  goToStep(0);
  animProgress = 0;
  targetRotX = 0;
  targetRotY = 0;
  rotX = 0;
  rotY = 0;
  autoRotate = true;
  const mainGroup = scene.userData.mainGroup;
  if (mainGroup) mainGroup.rotation.set(0, 0, 0);
});

// Speed
const speeds = [1, 1.5, 2, 0.5];
let speedIndex = 0;
document.getElementById('btnSpeed').addEventListener('click', () => {
  speedIndex = (speedIndex + 1) % speeds.length;
  speedMultiplier = speeds[speedIndex];
  document.getElementById('btnSpeed').textContent = speeds[speedIndex] + 'x';
  document.getElementById('speedBadge').textContent = speeds[speedIndex] + 'x 速度';
});

// ============================================================
// MAIN ANIMATION LOOP
// ============================================================
function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const mainGroup = scene.userData.mainGroup;

  // Camera rotation (gyro or touch)
  rotX += (targetRotX - rotX) * 0.08;
  rotY += (targetRotY - rotY) * 0.08;

  if (mainGroup) {
    // Apply gyro/touch rotation to the group
    if (!autoRotate) {
      mainGroup.rotation.x = rotX;
      mainGroup.rotation.y += (rotY - mainGroup.rotation.y) * 0.1;
    } else if (currentStep < 5) {
      // Gentle auto-rotate when no user input
      mainGroup.rotation.y += delta * 0.15;
    }
  }

  // Step animation
  if (isPlaying && currentStep < steps.length) {
    const stepDuration = steps[currentStep].duration;
    animProgress += (delta * speedMultiplier) / stepDuration;

    if (animProgress >= 1) {
      getStepAnimation(currentStep, 1);
      if (currentStep < steps.length - 1) {
        currentStep++;
        animProgress = 0;
        updateStepDots();
        updateNarration();
        speakNarration(steps[currentStep].narration);
      } else {
        isPlaying = false;
        document.getElementById('btnPlay').textContent = '▶';
        animProgress = 1;
      }
    } else {
      getStepAnimation(currentStep, animProgress);
    }
  } else if (!isPlaying) {
    // Still animate current step at current progress for manual scrubbing
    getStepAnimation(currentStep, animProgress);
  }

  renderer.render(scene, camera);
}

// Ensure voices are loaded
speechSynthesis.onvoiceschanged = () => {};
</script>
